<html lang="en">

<head>
  <meta charset="UTF-8">

<body id="top">

  <!-- #HEADER -->
  <header class="header" data-header>
    <div class="container">

      <a href="./index.html" class="logo">
        <img src="./assets/images/filmhaven.svg" alt="FilmHaven logo">
      </a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li>
            <a href="./movies.html" class="navbar-link active">Home</a>
          </li>
        </ul>
      </nav>

      <div class="genre-dropdown-wrapper">
        <button class="genre-dropdown-btn" id="genre-dropdown-btn" onclick="toggleGenrePanel(event)" style="border:1.5px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);padding:0.45rem 1rem;border-radius:9999px;">
          <ion-icon name="grid-outline"></ion-icon>
          Genres
          <ion-icon name="chevron-down-outline"></ion-icon>
        </button>
        <div class="genre-panel" id="genre-panel">
          <div class="genre-panel-title">Choose Genre</div>
          <div class="genre-panel-grid" id="genre-panel-grid">
            <a href="./movies.html?genre=28&name=Action" class="genre-panel-item">Action</a>
            <a href="./movies.html?genre=12&name=Adventure" class="genre-panel-item">Adventure</a>
            <a href="./movies.html?genre=16&name=Animation" class="genre-panel-item">Animation</a>
            <a href="./movies.html?genre=35&name=Comedy" class="genre-panel-item">Comedy</a>
            <a href="./movies.html?genre=80&name=Crime" class="genre-panel-item">Crime</a>
            <a href="./movies.html?genre=99&name=Documentary" class="genre-panel-item">Documentary</a>
            <a href="./movies.html?genre=18&name=Drama" class="genre-panel-item">Drama</a>
            <a href="./movies.html?genre=10751&name=Family" class="genre-panel-item">Family</a>
            <a href="./movies.html?genre=14&name=Fantasy" class="genre-panel-item">Fantasy</a>
            <a href="./movies.html?genre=36&name=History" class="genre-panel-item">History</a>
            <a href="./movies.html?genre=27&name=Horror" class="genre-panel-item">Horror</a>
            <a href="./movies.html?genre=10402&name=Music" class="genre-panel-item">Music</a>
            <a href="./movies.html?genre=9648&name=Mystery" class="genre-panel-item">Mystery</a>
            <a href="./movies.html?genre=10749&name=Romance" class="genre-panel-item">Romance</a>
            <a href="./movies.html?genre=878&name=Science Fiction" class="genre-panel-item">Sci-Fi</a>
            <a href="./movies.html?genre=53&name=Thriller" class="genre-panel-item">Thriller</a>
            <a href="./movies.html?genre=10752&name=War" class="genre-panel-item">War</a>
            <a href="./movies.html?genre=37&name=Western" class="genre-panel-item">Western</a>
          </div>
        </div>
      </div>

    </div>
  </header>

  <!-- Genre overlay for mobile -->
  <div class="genre-overlay" id="genre-overlay" onclick="closeGenrePanel()"></div>

  <main>
    <section class="movies-page">
      <div class="container">
        
        <!-- Page Header -->
        <div class="page-header">
          <h1 class="page-title" id="page-title">FilmHaven</h1>
          <p class="page-subtitle" id="page-subtitle">Movies & TV Shows, all in one place</p>
        </div>

        <!-- Content Type Toggle -->
        <div class="content-type-toggle" id="content-type-toggle">
          <button class="type-toggle-btn active" data-type="all" onclick="switchContentType('all')">
            <ion-icon name="apps-outline"></ion-icon>
            All
          </button>
          <button class="type-toggle-btn" data-type="movies" onclick="switchContentType('movies')">
            <ion-icon name="film-outline"></ion-icon>
            Movies
          </button>
          <button class="type-toggle-btn" data-type="tv" onclick="switchContentType('tv')">
            <ion-icon name="tv-outline"></ion-icon>
            TV Shows
          </button>
        </div>

        <!-- Search Section -->
        <div class="search-section">
          <div class="search-container">
            <input type="text" id="movie-search" class="search-input" placeholder="Search movies & TV shows..." autocomplete="off">
            <button class="search-submit-btn" onclick="performSearch();">
              <ion-icon name="search-outline"></ion-icon>
            </button>
          </div>
        </div>

        <!-- Content Grid -->
        <ul id="movies-container" class="movies-grid">
          <div class="loading">Loading content...</div>
        </ul>

        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display: none;">
          <button class="pagination-btn" id="prev-btn" onclick="changePage(-1)">
            <ion-icon name="chevron-back"></ion-icon>
            Previous
          </button>
          <span class="pagination-info" id="page-info">Page 1 of 1</span>
          <button class="pagination-btn" id="next-btn" onclick="changePage(1)">
            Next
            <ion-icon name="chevron-forward"></ion-icon>
          </button>
        </div>

      </div>
    </section>
  </main>

  <!-- #FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-logo">
        <a href="./index.html" class="logo">
          <img src="./assets/images/filmhaven.svg" alt="FilmHaven logo">
        </a>
      </div>
    </div>
  </footer>

  <!-- #GO TO TOP -->
  <a href="#top" class="go-top" data-go-top>
    <ion-icon name="chevron-up"></ion-icon>
  </a>

  <!-- ionicon link -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <!-- custom js link -->
  <script src="./assets/js/movie-api.js?v=4"></script>
  <script src="./assets/js/script.js"></script>

  <!-- Main Page Script -->
  <script>
    let currentPage = 1;
    let currentGenre = '';
    let currentGenreName = '';
    let currentSearchQuery = '';
    let currentContentType = 'all'; // 'all', 'movies', 'tv'
    let totalPages = 1;

    // Genre panel toggle
    function toggleGenrePanel(event) {
      event.preventDefault();
      event.stopPropagation();
      const btn = document.getElementById('genre-dropdown-btn');
      const panel = document.getElementById('genre-panel');
      const overlay = document.getElementById('genre-overlay');
      const isActive = panel.classList.contains('active');
      
      if (isActive) {
        closeGenrePanel();
      } else {
        btn.classList.add('active');
        panel.classList.add('active');
        overlay.classList.add('active');
      }
    }

    function closeGenrePanel() {
      const btn = document.getElementById('genre-dropdown-btn');
      const panel = document.getElementById('genre-panel');
      const overlay = document.getElementById('genre-overlay');
      btn.classList.remove('active');
      panel.classList.remove('active');
      overlay.classList.remove('active');
    }

    // Close genre panel when clicking outside
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.genre-dropdown-wrapper')) {
        closeGenrePanel();
      }
    });

    // Content type switching
    function switchContentType(type) {
      currentContentType = type;
      currentPage = 1;
      currentSearchQuery = '';
      const searchInput = document.getElementById('movie-search');
      if (searchInput) searchInput.value = '';

      // Update toggle buttons
      document.querySelectorAll('.type-toggle-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`.type-toggle-btn[data-type="${type}"]`).classList.add('active');

      // Update search placeholder
      if (searchInput) {
        if (type === 'movies') searchInput.placeholder = 'Search movies...';
        else if (type === 'tv') searchInput.placeholder = 'Search TV shows...';
        else searchInput.placeholder = 'Search movies & TV shows...';
      }

      loadContent();
    }

    // Initialize the page
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof window.movieAPI === 'undefined') {
        console.error('Movie API not loaded!');
        return;
      }
      
      handleURLParameters();
      loadContent();
      
      // Search event listeners
      const searchInput = document.getElementById('movie-search');
      if (searchInput) {
        searchInput.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            performSearch();
          }
        });
        
        let searchTimeout;
        searchInput.addEventListener('input', function() {
          const query = this.value.trim();
          if (searchTimeout) clearTimeout(searchTimeout);
          
          if (query === '') {
            currentSearchQuery = '';
            currentPage = 1;
            loadContent();
          } else {
            this.style.borderColor = '#c8a55a';
            searchTimeout = setTimeout(() => {
              currentSearchQuery = query;
              currentPage = 1;
              loadContent();
              this.style.borderColor = '';
            }, 500);
          }
        });
      }
    });
    
    // Handle URL parameters for genre filtering
    function handleURLParameters() {
      const urlParams = new URLSearchParams(window.location.search);
      const genreId = urlParams.get('genre');
      const genreName = urlParams.get('name');
      
      if (genreId && genreName) {
        currentGenre = genreId;
        currentGenreName = genreName;
        
        const pageTitle = document.getElementById('page-title');
        if (pageTitle) pageTitle.textContent = `${genreName}`;
        
        const pageSubtitle = document.getElementById('page-subtitle');
        if (pageSubtitle) pageSubtitle.textContent = `Discover the best ${genreName.toLowerCase()} content`;
      }
    }

    // Load content based on current filters and type
    async function loadContent() {
      const container = document.getElementById('movies-container');
      container.innerHTML = '<div class="loading">Loading content...</div>';

      try {
        let response = null;

        if (currentContentType === 'all') {
          response = await loadAllContent();
        } else if (currentContentType === 'movies') {
          response = await loadMoviesContent();
        } else if (currentContentType === 'tv') {
          response = await loadTVContent();
        }

        if (!response || !response.movies) {
          container.innerHTML = '<div class="error">Error loading content. Please try again.</div>';
          return;
        }

        const items = response.movies;
        totalPages = response.totalPages || 1;

        if (items.length === 0) {
          container.innerHTML = '<div class="no-results">No content found matching your criteria.</div>';
          document.getElementById('pagination').style.display = 'none';
          return;
        }

        displayContent(items);
        updatePagination();

      } catch (error) {
        console.error('Error loading content:', error);
        container.innerHTML = '<div class="error">Error loading content. Please try again.</div>';
      }
    }

    // Load ALL content (movies + TV shows mixed)
    async function loadAllContent() {
      if (currentSearchQuery) {
        // Search both movies and TV
        const [moviesRes, tvRes] = await Promise.all([
          window.movieAPI.searchMovies(currentSearchQuery, currentPage),
          window.movieAPI.searchTVSeries(currentSearchQuery, currentPage)
        ]);
        
        const allItems = [
          ...(moviesRes?.movies || []).map(m => ({ ...m, contentType: 'movie' })),
          ...(tvRes?.movies || []).map(t => ({ ...t, contentType: 'tv' }))
        ];
        
        // Sort by popularity/rating
        allItems.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
        
        return {
          movies: allItems,
          totalPages: Math.max(moviesRes?.totalPages || 1, tvRes?.totalPages || 1),
          totalResults: (moviesRes?.totalResults || 0) + (tvRes?.totalResults || 0)
        };
      }
      
      if (currentGenre) {
        // Filter both by genre
        const [moviesRes, tvRes] = await Promise.all([
          window.movieAPI.getFilteredMovies({ genre: currentGenre, page: currentPage }),
          window.movieAPI.getFilteredTVSeries({ genre: currentGenre, page: currentPage })
        ]);
        
        const allItems = [
          ...(moviesRes?.movies || []).map(m => ({ ...m, contentType: 'movie' })),
          ...(tvRes?.movies || []).map(t => ({ ...t, contentType: 'tv' }))
        ];
        
        allItems.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
        
        return {
          movies: allItems,
          totalPages: Math.max(moviesRes?.totalPages || 1, tvRes?.totalPages || 1),
          totalResults: (moviesRes?.totalResults || 0) + (tvRes?.totalResults || 0)
        };
      }

      // Default: load popular movies + TV
      const [moviesRes, tvRes] = await Promise.all([
        window.movieAPI.getPopularMovies(currentPage),
        window.movieAPI.getPopularTVSeries(currentPage)
      ]);
      
      const allItems = [
        ...(moviesRes?.movies || []).map(m => ({ ...m, contentType: 'movie' })),
        ...(tvRes?.movies || []).map(t => ({ ...t, contentType: 'tv' }))
      ];
      
      allItems.sort((a, b) => (b.popularity || 0) - (a.popularity || 0));
      
      return {
        movies: allItems,
        totalPages: Math.max(moviesRes?.totalPages || 1, tvRes?.totalPages || 1),
        totalResults: (moviesRes?.totalResults || 0) + (tvRes?.totalResults || 0)
      };
    }

    // Load movies only
    async function loadMoviesContent() {
      if (currentSearchQuery) {
        const res = await window.movieAPI.searchMovies(currentSearchQuery, currentPage);
        return {
          movies: (res?.movies || []).map(m => ({ ...m, contentType: 'movie' })),
          totalPages: res?.totalPages || 1,
          totalResults: res?.totalResults || 0
        };
      }
      if (currentGenre) {
        const res = await window.movieAPI.getFilteredMovies({ genre: currentGenre, page: currentPage });
        return {
          movies: (res?.movies || []).map(m => ({ ...m, contentType: 'movie' })),
          totalPages: res?.totalPages || 1,
          totalResults: res?.totalResults || 0
        };
      }
      const res = await window.movieAPI.getPopularMovies(currentPage);
      return {
        movies: (res?.movies || []).map(m => ({ ...m, contentType: 'movie' })),
        totalPages: res?.totalPages || 1,
        totalResults: res?.totalResults || 0
      };
    }

    // Load TV shows only
    async function loadTVContent() {
      if (currentSearchQuery) {
        const res = await window.movieAPI.searchTVSeries(currentSearchQuery, currentPage);
        return {
          movies: (res?.movies || []).map(t => ({ ...t, contentType: 'tv' })),
          totalPages: res?.totalPages || 1,
          totalResults: res?.totalResults || 0
        };
      }
      if (currentGenre) {
        const res = await window.movieAPI.getFilteredTVSeries({ genre: currentGenre, page: currentPage });
        return {
          movies: (res?.movies || []).map(t => ({ ...t, contentType: 'tv' })),
          totalPages: res?.totalPages || 1,
          totalResults: res?.totalResults || 0
        };
      }
      const res = await window.movieAPI.getPopularTVSeries(currentPage);
      return {
        movies: (res?.movies || []).map(t => ({ ...t, contentType: 'tv' })),
        totalPages: res?.totalPages || 1,
        totalResults: res?.totalResults || 0
      };
    }

    // Display content in grid
    function displayContent(items) {
      const container = document.getElementById('movies-container');
      container.innerHTML = '';

      items.forEach(item => {
        const card = document.createElement('li');
        const isTV = item.contentType === 'tv' || item.mediaType === 'tv';
        card.className = 'movie-card';
        
        const detailUrl = isTV 
          ? `./tv-show-details.html?id=${item.id}&type=tv`
          : `./movie-details.html?id=${item.id}`;

        // Touch handlers
        let touchStartY = 0, touchStartX = 0, isScrolling = false;
        card.addEventListener('touchstart', (e) => {
          touchStartY = e.touches[0].clientY;
          touchStartX = e.touches[0].clientX;
          isScrolling = false;
        });
        card.addEventListener('touchmove', (e) => {
          if (Math.abs(e.touches[0].clientY - touchStartY) > 10 || Math.abs(e.touches[0].clientX - touchStartX) > 10) {
            isScrolling = true;
          }
        });
        card.addEventListener('touchend', (e) => {
          if (!isScrolling) { e.preventDefault(); window.location.href = detailUrl; }
        });
        card.addEventListener('click', (e) => { e.preventDefault(); window.location.href = detailUrl; });
        
        card.innerHTML = `
          <a href="${detailUrl}">
            <figure class="card-banner">
              ${isTV ? '<span class="tv-badge">TV</span>' : ''}
              <img src="${item.poster}" alt="${item.title}" loading="lazy">
              <div class="card-info">
                <h3 class="card-title">${item.title}</h3>
                <div class="card-meta">
                  <div class="rating">
                    <ion-icon name="star"></ion-icon>
                    <span>${item.rating}</span>
                  </div>
                  <div class="duration">
                    <ion-icon name="time-outline"></ion-icon>
                    <span>${item.duration}</span>
                  </div>
                </div>
              </div>
            </figure>
          </a>
          <div class="title-wrapper">
            <h3 class="card-title">${item.title}</h3>
            <time datetime="${item.year}">${item.year}</time>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Update pagination
    function updatePagination() {
      const pagination = document.getElementById('pagination');
      const pageInfo = document.getElementById('page-info');
      const prevBtn = document.getElementById('prev-btn');
      const nextBtn = document.getElementById('next-btn');

      pagination.style.display = 'flex';
      pageInfo.textContent = totalPages > 1 ? `Page ${currentPage} of ${totalPages}` : `Page ${currentPage}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    // Change page
    function changePage(direction) {
      const newPage = currentPage + direction;
      if (newPage >= 1 && newPage <= totalPages) {
        currentPage = newPage;
        loadContent();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    // Perform search
    function performSearch() {
      const searchInput = document.getElementById('movie-search');
      if (!searchInput) return;
      const query = searchInput.value.trim();
      if (query === '') {
        currentSearchQuery = '';
        currentPage = 1;
        loadContent();
        return;
      }
      currentSearchQuery = query;
      currentPage = 1;
      loadContent();
    }
  </script>

  <script src="./assets/js/ads-loader.js"></script>
</body>
