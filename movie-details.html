  <!-- #HEADER -->
  <header class="header" data-header>
    <div class="container">

      <a href="./movies.html" class="logo">
        <img src="./assets/images/filmhaven.svg" alt="FilmHaven logo">
      </a>

      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li>
            <a href="./movies.html" class="navbar-link">Home</a>
          </li>
        </ul>
      </nav>

      <div class="genre-dropdown-wrapper">
        <button class="genre-dropdown-btn" id="genre-dropdown-btn" onclick="toggleGenrePanel(event)" style="border:1.5px solid var(--accent-border);background:var(--accent-dim);color:var(--accent);padding:0.45rem 1rem;border-radius:9999px;">

          Genres
          <ion-icon name="chevron-down-outline"></ion-icon>
        </button>
        <div class="genre-panel" id="genre-panel">
          <div class="genre-panel-title">Choose Genre</div>
          <div class="genre-panel-grid">
            <a href="./movies.html?genre=28&name=Action" class="genre-panel-item">Action</a>
            <a href="./movies.html?genre=12&name=Adventure" class="genre-panel-item">Adventure</a>
            <a href="./movies.html?genre=16&name=Animation" class="genre-panel-item">Animation</a>
            <a href="./movies.html?genre=35&name=Comedy" class="genre-panel-item">Comedy</a>
            <a href="./movies.html?genre=80&name=Crime" class="genre-panel-item">Crime</a>
            <a href="./movies.html?genre=99&name=Documentary" class="genre-panel-item">Documentary</a>
            <a href="./movies.html?genre=18&name=Drama" class="genre-panel-item">Drama</a>
            <a href="./movies.html?genre=10751&name=Family" class="genre-panel-item">Family</a>
            <a href="./movies.html?genre=14&name=Fantasy" class="genre-panel-item">Fantasy</a>
            <a href="./movies.html?genre=36&name=History" class="genre-panel-item">History</a>
            <a href="./movies.html?genre=27&name=Horror" class="genre-panel-item">Horror</a>
            <a href="./movies.html?genre=9648&name=Mystery" class="genre-panel-item">Mystery</a>
            <a href="./movies.html?genre=10749&name=Romance" class="genre-panel-item">Romance</a>
            <a href="./movies.html?genre=878&name=Science Fiction" class="genre-panel-item">Sci-Fi</a>
            <a href="./movies.html?genre=53&name=Thriller" class="genre-panel-item">Thriller</a>
            <a href="./movies.html?genre=10752&name=War" class="genre-panel-item">War</a>

          </div>
        </div>
      </div>

    </div>
  </header>

  <!-- Genre overlay for mobile -->
  <div class="genre-overlay" id="genre-overlay" onclick="closeGenrePanel()"></div>

  <main>
    <section class="cinema-detail">
      <div class="container">

        <!-- Back button -->
        <a href="./movies.html" class="cinema-back-btn" id="back-btn">
          <ion-icon name="arrow-back-outline"></ion-icon>
          Back to Browse
        </a>

        <!-- Player Section -->
        <div class="cinema-player-section" id="cinema-player-section">

          <!-- Server Tabs (compact pills) -->
          <div class="cinema-server-tabs" id="cinema-server-tabs">
            <!-- Populated by JS -->
          </div>

          <!-- Video Player -->
          <div class="cinema-player-container">
            <div class="cinema-player-wrapper">
              <iframe id="cinema-player-iframe" 
                      src="" 
                      frameborder="0" 
                      allowfullscreen
                      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                      loading="eager"></iframe>
            </div>
            <div class="cinema-player-bar">
              <div class="player-info">
                <span id="cinema-now-playing">Select a server to start watching</span>
              </div>
              <div class="player-actions">
                <button class="player-btn" id="refresh-btn" title="Refresh">
                  <ion-icon name="refresh-outline"></ion-icon>
                </button>
              </div>
            </div>
          </div>

        </div>

        <!-- Movie Info Card -->
        <div class="cinema-info-card" id="cinema-info-card" style="opacity:0;transition:opacity 0.4s ease;">
          <div class="cinema-info-header">
            <img id="cinema-poster" class="cinema-info-poster" src="" alt="">
            <div class="cinema-info-text">
              <h1 class="cinema-info-title" id="cinema-title">&nbsp;</h1>
              <div class="cinema-info-meta" id="cinema-meta">
                <div class="badge badge-fill" id="cinema-rating">—</div>
                <div class="badge badge-outline" id="cinema-quality">HD</div>
                <span style="color: var(--text-dim);" id="cinema-year">—</span>
                <span style="color: var(--text-dim);" id="cinema-duration">—</span>
              </div>
              <div class="cinema-info-genres" id="cinema-genres"></div>
              <p class="cinema-info-overview" id="cinema-overview">&nbsp;</p>
            </div>
          </div>
        </div>

      </div>
    </section>
  </main>

  <!-- #FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-logo">
        <a href="./movies.html" class="logo">
          <img src="./assets/images/filmhaven.svg" alt="FilmHaven logo">
        </a>
      </div>
    </div>
  </footer>

  <a href="#top" class="go-top" data-go-top>
    <ion-icon name="chevron-up"></ion-icon>
  </a>

  <!-- ionicon link -->
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

  <script src="./assets/js/movie-api.js?v=4"></script>
  <script src="./assets/js/script.js"></script>

  <!-- Cinema Mode Script -->
  <script>
    let currentMovie = null;

    // Genre panel toggle
    function toggleGenrePanel(event) {
      event.preventDefault();
      event.stopPropagation();
      const btn = document.getElementById('genre-dropdown-btn');
      const panel = document.getElementById('genre-panel');
      const overlay = document.getElementById('genre-overlay');
      const isActive = panel.classList.contains('active');
      if (isActive) { closeGenrePanel(); } 
      else { btn.classList.add('active'); panel.classList.add('active'); overlay.classList.add('active'); }
    }
    function closeGenrePanel() {
      document.getElementById('genre-dropdown-btn').classList.remove('active');
      document.getElementById('genre-panel').classList.remove('active');
      document.getElementById('genre-overlay').classList.remove('active');
    }
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.genre-dropdown-wrapper')) closeGenrePanel();
    });

    // Load movie details
    async function loadMovieDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const movieId = urlParams.get('id');
      const type = urlParams.get('type');
      
      if (!movieId) {
        showNoMovie();
        return;
      }
      
      try {
        let movie;
        if (type === 'tv') {
          movie = await window.movieAPI.getTVSeriesDetails(movieId);
        } else {
          movie = await window.movieAPI.getMovieDetails(movieId);
        }
        
        if (movie) {
          currentMovie = movie;
          displayMovieInfo(movie, type);
          loadServers(movie, type);
        } else {
          showNoMovie();
        }
      } catch (error) {
        console.error('Error loading movie details:', error);
        showNoMovie();
      }
    }

    // Display movie info in cinema card
    function displayMovieInfo(movie, type) {
      document.title = `${movie.title} - FilmHaven`;
      
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
      
      // Poster
      const poster = document.getElementById('cinema-poster');
      if (poster) { poster.src = movie.poster; poster.alt = movie.title; }
      
      // Title
      document.getElementById('cinema-title').textContent = movie.title;
      
      // Meta
      set('cinema-rating', `${movie.rating} ★`);
      set('cinema-quality', movie.quality || 'HD');
      set('cinema-year', movie.year);
      set('cinema-duration', movie.duration || '—');
      
      // Genres
      const genresEl = document.getElementById('cinema-genres');
      if (genresEl && movie.genre) {
        genresEl.innerHTML = movie.genre.split(', ').map(g => `<span>${g}</span>`).join('');
      }
      
      // Overview
      set('cinema-overview', movie.overview || '');
      
      // Fade in
      const card = document.getElementById('cinema-info-card');
      if (card) card.style.opacity = '1';
    }

    // Load servers
    function loadServers(movie, type = 'movie') {
      const serverTabs = document.getElementById('cinema-server-tabs');
      if (!serverTabs) return;
      
      const servers = [
        { name: 'Server 1', url: type === 'tv' ? `https://vidsrc.me/embed/tv/${movie.id}` : `https://vidsrc.me/embed/movie/${movie.id}`, quality: 'HD' },
        { name: 'Server 2', url: `https://player.autoembed.cc/embed/${type === 'tv' ? 'tv' : 'movie'}/${movie.id}`, quality: 'HD' },
        { name: 'Server 3', url: type === 'tv' ? `https://vidcloud.icu/embed/tv/${movie.id}` : `https://vidcloud.icu/embed/movie/${movie.id}`, quality: 'HD' }
      ];
      
      serverTabs.innerHTML = '';
      
      servers.forEach((server, index) => {
        const tab = document.createElement('button');
        tab.className = 'cinema-server-tab' + (index === 0 ? ' active' : '');
        tab.innerHTML = `<ion-icon name="play-circle"></ion-icon> ${server.name} <span style="opacity:0.7;font-size:0.65rem;">${server.quality}</span>`;
        
        tab.addEventListener('click', () => {
          document.querySelectorAll('.cinema-server-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          loadVideo(server.url, server.name);
        });
        
        serverTabs.appendChild(tab);
      });
      
      // Auto-load first server
      if (servers.length > 0) {
        loadVideo(servers[0].url, servers[0].name);
      }
    }

    // Load video into iframe
    function loadVideo(url, serverName) {
      const iframe = document.getElementById('cinema-player-iframe');
      const nowPlaying = document.getElementById('cinema-now-playing');
      
      if (iframe) {
        iframe.src = '';
        setTimeout(() => {
          iframe.src = url;
        }, 100);
      }
      
      if (nowPlaying && currentMovie) {
        nowPlaying.innerHTML = `<span>Now playing:</span> ${currentMovie.title} — ${serverName}`;
      }
    }

    // Show no movie message
    function showNoMovie() {
      const section = document.getElementById('cinema-player-section');
      if (section) section.style.display = 'none';
      
      const card = document.getElementById('cinema-info-card');
      if (card) {
        card.innerHTML = `
          <div style="text-align:center;padding:var(--spacing-2xl);">
            <p style="color:var(--accent);font-size:var(--fs-xl);margin-bottom:var(--spacing-lg);">No movie selected</p>
            <p style="color:var(--text-muted);margin-bottom:var(--spacing-xl);">Browse our collection and click on a title to watch.</p>
            <a href="./movies.html" class="btn btn-primary">Browse Content</a>
          </div>`;
        card.style.opacity = '1';
      }
    }

    // Player controls
    function initControls() {
      const fullscreenBtn = document.getElementById('fullscreen-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const iframe = document.getElementById('cinema-player-iframe');
      
      if (fullscreenBtn && iframe) {
        fullscreenBtn.addEventListener('click', () => {
          if (iframe.requestFullscreen) iframe.requestFullscreen();
          else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
          else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
        });
      }
      
      if (refreshBtn && iframe) {
        refreshBtn.addEventListener('click', () => {
          const src = iframe.src;
          iframe.src = '';
          setTimeout(() => { iframe.src = src; }, 100);
        });
      }
    }

    // Init
    document.addEventListener('DOMContentLoaded', function() {
      loadMovieDetails();
      initControls();
    });
  </script>

  <script src="./assets/js/ads-loader.js"></script>
</body>
