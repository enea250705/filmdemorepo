  <!-- Genre Panel Script -->
  <script>
    function toggleGenrePanel(event) {
      event.preventDefault();
      event.stopPropagation();
      const btn = document.getElementById('genre-dropdown-btn');
      const panel = document.getElementById('genre-panel');
      const overlay = document.getElementById('genre-overlay');
      const isActive = panel.classList.contains('active');
      if (isActive) { closeGenrePanel(); }
      else { btn.classList.add('active'); panel.classList.add('active'); overlay.classList.add('active'); }
    }
    function closeGenrePanel() {
      document.getElementById('genre-dropdown-btn').classList.remove('active');
      document.getElementById('genre-panel').classList.remove('active');
      document.getElementById('genre-overlay').classList.remove('active');
    }
    document.addEventListener('click', function(event) {
      if (!event.target.closest('.genre-dropdown-wrapper')) closeGenrePanel();
    });
  </script>

  <!-- Include openMoviePlayer function for TV shows -->
  <script>
    // Make sure openMoviePlayer is available (from script.js)
    if (typeof openMoviePlayer === 'undefined') {
      // Fallback function if not available
      window.openMoviePlayer = function(embedUrl, title) {
        const modal = document.createElement('div');
        modal.className = 'video-modal';
        modal.innerHTML = `
          <div class="modal-overlay">
            <div class="modal-content">
              <button class="modal-close" onclick="this.closest('.video-modal').remove()">&times;</button>
              <h3>${title}</h3>
              <div class="video-container">
                <iframe src="${embedUrl}" frameborder="0" allowfullscreen></iframe>
              </div>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        
        // Close on overlay click
        modal.querySelector('.modal-overlay').addEventListener('click', (e) => {
          if (e.target === modal.querySelector('.modal-overlay')) {
            modal.remove();
          }
        });
      };
    }
  </script>

  <!-- TV Show Details Script -->
  <script>
    let currentTVShow = null;
    let currentSeason = 1;
    let currentEpisodeNumber = 1;
    let seasons = [];
    let episodes = [];

    // Initialize the page with retry mechanism
    document.addEventListener('DOMContentLoaded', function() {
      let retryCount = 0;
      const maxRetries = 50; // 5 seconds max wait (50 * 100ms)
      
      function initializePage() {
        if (typeof window.movieAPI === 'undefined') {
          retryCount++;
          if (retryCount >= maxRetries) {
            console.error('movieAPI not available after maximum retries');
            const banner = document.getElementById('tv-show-banner');
            if (banner) {
              banner.innerHTML = '<div class="error">Failed to load TV show API. Please refresh the page.</div>';
            }
            return;
          }
          setTimeout(initializePage, 100);
          return;
        }
        
        console.log('movieAPI is available, loading TV show details...');
        loadTVShowDetails();
      }
      
      // Start initialization
      initializePage();
    });

    // Load TV show details
    async function loadTVShowDetails() {
      const urlParams = new URLSearchParams(window.location.search);
      const seriesId = urlParams.get('id');
      
      console.log('TV Show Details Page - URL params:', window.location.search);
      console.log('TV Show Details Page - Series ID:', seriesId);
      
      if (!seriesId) {
        console.error('No TV show ID provided in URL');
        document.getElementById('tv-show-banner').innerHTML = '<div class="error">No TV show ID provided. Please go back and select a TV show.</div>';
        return;
      }

      try {
        console.log('Loading TV show details for ID:', seriesId);
        
        // Check if movieAPI is available
        if (typeof window.movieAPI === 'undefined') {
          throw new Error('Movie API not loaded');
        }
        
        // Add timeout protection for initial load
        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => reject(new Error('Request timeout - API took too long to respond')), 20000);
        });
        
        // Get TV show details with timeout
        const apiCall = window.movieAPI.getTVSeriesDetails(seriesId);
        const tvShow = await Promise.race([apiCall, timeoutPromise]);
        
        console.log('TV Show API response:', tvShow);
        
        if (!tvShow) {
          throw new Error('TV show not found');
        }

        currentTVShow = tvShow;
        // Filter out season 0 (specials) entirely
        seasons = (tvShow.seasons || []).filter(s => s.season_number > 0);
        
        // Update page title
        document.title = `${tvShow.title} - FilmHaven`;

        // Display TV show banner
        displayTVShowBanner(tvShow);

        // Display seasons
        displaySeasons(seasons);

        // Auto-select first season
        if (seasons.length > 0) {
          currentSeason = seasons[0].season_number;
          await loadEpisodes(currentSeason);
        } else {
          const episodesGrid = document.getElementById('episodes-grid');
          if (episodesGrid) {
            episodesGrid.innerHTML = '<div class="error">No seasons available for this TV show.</div>';
          }
        }

      } catch (error) {
        console.error('Error loading TV show details:', error);
        const banner = document.getElementById('tv-show-banner');
        const seasonsGrid = document.getElementById('seasons-grid');
        const episodesGrid = document.getElementById('episodes-grid');
        
        if (banner) {
          banner.innerHTML = `<div class="error" style="color: #ff4444; padding: 40px; text-align: center;">Error loading TV show details: ${error.message}<br><br><a href="./tv-series.html" style="color: #c8a55a; text-decoration: underline;">Go back to TV Shows</a></div>`;
        }
        
        if (seasonsGrid) {
          seasonsGrid.innerHTML = '<div class="error">Unable to load seasons</div>';
        }
        
        if (episodesGrid) {
          episodesGrid.innerHTML = '<div class="error">Unable to load episodes</div>';
        }
      }
    }

    // Display TV show info as a clean card (no giant banner)
    function displayTVShowBanner(tvShow) {
      const banner = document.getElementById('tv-show-banner');
      banner.className = 'cinema-info-card';
      banner.style.cssText = 'opacity:1;';
      banner.innerHTML = `
        <a href="./movies.html" class="cinema-back-btn" style="margin-bottom:1rem;display:inline-flex;">
          <ion-icon name="arrow-back-outline"></ion-icon>
          Back to Browse
        </a>
        <div class="cinema-info-header">
          <img src="${tvShow.poster}" alt="${tvShow.title}" class="cinema-info-poster" style="display:block;width:90px;border-radius:8px;">
          <div class="cinema-info-text">
            <h1 class="cinema-info-title">${tvShow.title}</h1>
            <div class="cinema-info-meta" style="gap:0.5rem;flex-wrap:wrap;">
              <div class="badge badge-fill" style="font-size:0.65rem;">${tvShow.rating} ★</div>
              <div class="badge badge-outline" style="font-size:0.65rem;">${tvShow.quality || 'HD'}</div>
              <span style="color:var(--text-dim);font-size:var(--fs-xs);">${tvShow.year}</span>
              <span style="color:var(--text-dim);font-size:var(--fs-xs);">${tvShow.duration || ''}</span>
              <span style="color:var(--accent);font-size:var(--fs-xs);font-weight:600;">${tvShow.status || 'TV Series'}</span>
            </div>
            ${tvShow.genre ? `<div class="cinema-info-genres">${tvShow.genre.split(', ').map(g => `<span>${g}</span>`).join('')}</div>` : ''}
          </div>
        </div>
        <p class="cinema-info-overview" style="margin-top:0.75rem;">${tvShow.overview || ''}</p>
      `;
    }

    // Display seasons as compact pill tabs
    function displaySeasons(seasons) {
      const seasonsGrid = document.getElementById('seasons-grid');
      
      if (!seasons || seasons.length === 0) {
        seasonsGrid.innerHTML = '<span style="color:var(--text-muted);font-size:0.8rem;">No seasons</span>';
        return;
      }

      seasonsGrid.innerHTML = seasons.map(season => `
        <button class="cinema-server-tab ${season.season_number === currentSeason ? 'active' : ''}" 
             onclick="selectSeason(${season.season_number})">
          S${season.season_number}
          <span style="opacity:0.7;font-size:0.65rem;">${season.episode_count || '?'} ep</span>
        </button>
      `).join('');
    }

    // Select season
    async function selectSeason(seasonNumber) {
      currentSeason = seasonNumber;
      
      // Update active tab
      document.querySelectorAll('#seasons-grid .cinema-server-tab').forEach(tab => {
        tab.classList.remove('active');
      });
      event.target.closest('.cinema-server-tab').classList.add('active');
      
      // Load episodes for selected season
      await loadEpisodes(seasonNumber);
    }

    // Load episodes for a season
    async function loadEpisodes(seasonNumber) {
      const episodesGrid = document.getElementById('episodes-grid');
      if (!episodesGrid) return;

      if (!currentTVShow || !currentTVShow.id) {
        episodesGrid.innerHTML = '<div class="error">TV show not loaded. Please refresh.</div>';
        return;
      }

      episodesGrid.innerHTML = '<div class="loading" style="padding:1.5rem;">Loading episodes...</div>';

      try {
        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => reject(new Error('Request timeout')), 15000);
        });

        const apiCall = window.movieAPI.getTVSeasonDetails(currentTVShow.id, seasonNumber);
        const seasonDetails = await Promise.race([apiCall, timeoutPromise]);
        
        if (!seasonDetails || !seasonDetails.episodes || seasonDetails.episodes.length === 0) {
          episodesGrid.innerHTML = '<div class="error">No episodes found for this season.</div>';
          return;
        }

        episodes = seasonDetails.episodes;
        displayEpisodes(episodes);

      } catch (error) {
        console.error('Error loading episodes:', error);
        episodesGrid.innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    // Display episodes as compact rows
    function displayEpisodes(episodes) {
      const episodesGrid = document.getElementById('episodes-grid');
      if (!episodesGrid || !episodes || episodes.length === 0) {
        if (episodesGrid) episodesGrid.innerHTML = '<div class="error">No episodes available</div>';
        return;
      }

      episodesGrid.innerHTML = `
        <div style="display:flex;flex-direction:column;gap:0.4rem;">
          ${episodes.map(ep => `
            <div onclick="watchEpisode(${ep.episode_number})" style="
              display:flex;align-items:center;gap:0.75rem;padding:0.65rem 0.9rem;
              background:rgba(255,255,255,0.04);border:1px solid var(--border-subtle);
              border-radius:var(--radius-md);cursor:pointer;transition:all 0.2s ease;
            " onmouseover="this.style.background='var(--accent-dim)';this.style.borderColor='var(--accent-border)'" 
               onmouseout="this.style.background='rgba(255,255,255,0.04)';this.style.borderColor='var(--border-subtle)'">
              <span style="
                min-width:32px;height:32px;display:flex;align-items:center;justify-content:center;
                background:var(--accent);color:#0a0800;border-radius:50%;font-size:0.7rem;
                font-weight:700;flex-shrink:0;
              ">${ep.episode_number}</span>
              <div style="flex:1;min-width:0;">
                <div style="font-size:var(--fs-sm);font-weight:600;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                  ${ep.name || 'Episode ' + ep.episode_number}
                </div>
                <div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px;">
                  ${ep.runtime ? ep.runtime + ' min' : ''}
                </div>
              </div>
              <ion-icon name="play-circle" style="font-size:1.4rem;color:var(--accent);flex-shrink:0;"></ion-icon>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Watch episode - Use embedded player with multiple server options
    function watchEpisode(episodeNumber) {
      if (!currentTVShow) {
        console.error('No TV show loaded');
        return;
      }

      console.log('Watching episode:', episodeNumber, 'of season:', currentSeason);
      
      // Get episode info
      const episode = episodes.find(ep => ep.episode_number === episodeNumber);
      const episodeName = episode ? episode.name : `Episode ${episodeNumber}`;
      
      // Show video servers section
      const videoServersSection = document.getElementById('video-servers-section');
      if (videoServersSection) {
        videoServersSection.style.display = 'block';
      }
      
      // Store current episode number
      currentEpisodeNumber = episodeNumber;
      
      // Load servers for this episode
      loadEpisodeServers(episodeNumber, episodeName);
      
      // Scroll to video player smoothly
      setTimeout(() => {
        const videoContainer = document.getElementById('video-player-container');
        if (videoContainer) {
          videoContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      }, 100);
    }
    
    // Load episode servers with multiple options
    function loadEpisodeServers(episodeNumber, episodeName) {
      const serverTabs = document.getElementById('server-tabs');
      if (!serverTabs) return;
      
      const tvShowId = currentTVShow.id;
      
      const servers = [
        {
          name: 'VidSrc Pro',
          url: `https://vidsrc.me/embed/tv?tmdb=${tvShowId}&season=${currentSeason}&episode=${episodeNumber}`,
          quality: 'HD',
          icon: 'play-circle',
          adWarning: false
        },
        {
          name: 'VidSrc Ultra',
          url: `https://vidsrc.to/embed/tv/${tvShowId}/${currentSeason}/${episodeNumber}`,
          quality: 'HD',
          icon: 'play-circle',
          adWarning: false
        },
        {
          name: 'AutoEmbed',
          url: `https://player.autoembed.cc/embed/tv/${tvShowId}/${currentSeason}/${episodeNumber}`,
          quality: 'HD',
          icon: 'play-circle',
          adWarning: true
        },
        {
          name: 'MultiEmbed',
          url: `https://multiembed.mov/?video_id=${tvShowId}&tmdb=1&s=${currentSeason}&e=${episodeNumber}`,
          quality: 'HD',
          icon: 'play-circle',
          adWarning: true
        }
      ];
      
      serverTabs.innerHTML = '';
      
      servers.forEach((server, index) => {
        const serverTab = document.createElement('button');
        serverTab.className = 'cinema-server-tab';
        if (index === 0) serverTab.classList.add('active');
        
        serverTab.innerHTML = `
          <ion-icon name="${server.icon}"></ion-icon>
          ${server.name}
          <span style="opacity:0.6;font-size:0.7em;margin-left:4px;">${server.quality}</span>
        `;
        
        serverTab.addEventListener('click', () => {
          // Remove active class from all tabs
          document.querySelectorAll('.cinema-server-tab').forEach(tab => tab.classList.remove('active'));
          // Add active class to clicked tab
          serverTab.classList.add('active');
          // Load the server
          loadServer(server.url, server.name, episodeName, server.adWarning);
        });
        
        serverTabs.appendChild(serverTab);
      });
      
      // Load the first server by default
      if (servers.length > 0) {
        loadServer(servers[0].url, servers[0].name, episodeName, servers[0].adWarning);
      }
    }
    
    // Load server in the embedded player
    function loadServer(url, name, episodeName, adWarning) {
      const iframe = document.getElementById('video-player-iframe');
      const episodeNameSpan = document.getElementById('current-episode-name');
      
      if (iframe && episodeNameSpan) {
        // Clear iframe first
        iframe.src = '';
        
        // Set iframe attributes
        iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
        iframe.setAttribute('allowfullscreen', 'true');
        iframe.setAttribute('loading', 'eager');
        
        // Set episode info
        let infoText = `<span>Now playing:</span> ${currentTVShow.title} - S${String(currentSeason).padStart(2, '0')}E${String(currentEpisodeNumber).padStart(2, '0')} - ${episodeName}`;
        if (adWarning) {
          infoText += ' <span style="color: #ffaa00;">(May contain ads)</span>';
        }
        episodeNameSpan.innerHTML = infoText;
        
        // Show the container
        const videoContainer = document.getElementById('video-player-container');
        if (videoContainer) {
          videoContainer.style.display = 'block';
        }
        
        // Small delay before loading
        setTimeout(() => {
          // Load the video
          iframe.src = url;
          console.log('Loading server:', name, 'URL:', url);
          
          // Add error handling
          iframe.onerror = function() {
            console.error('Iframe failed to load:', url);
            episodeNameSpan.innerHTML = `<span style="color: #ff4444;">Error loading ${name}. <a href="${url}" target="_blank" style="color: #c8a55a; text-decoration: underline;">Try opening in new tab</a></span>`;
          };
          
          // Add load event
          let loadTimeout;
          iframe.onload = function() {
            console.log('Iframe loaded successfully:', name);
            clearTimeout(loadTimeout);
          };
          
          // Add timeout detection
          loadTimeout = setTimeout(() => {
            console.warn('Video player may be stuck in loading state');
            episodeNameSpan.innerHTML = `<span style="color: #ffaa00;">Video taking longer than expected. <a href="${url}" target="_blank" style="color: #c8a55a; text-decoration: underline;">Try opening in new tab</a> or try a different server.</span>`;
          }, 10000);
        }, 200);
      }
    }
    
    // Initialize player controls
    function initializePlayerControls() {
      const fullscreenBtn = document.getElementById('fullscreen-btn');
      const refreshBtn = document.getElementById('refresh-btn');
      const iframe = document.getElementById('video-player-iframe');
      
      if (fullscreenBtn) {
        fullscreenBtn.addEventListener('click', () => {
          if (iframe.requestFullscreen) {
            iframe.requestFullscreen();
          } else if (iframe.webkitRequestFullscreen) {
            iframe.webkitRequestFullscreen();
          } else if (iframe.msRequestFullscreen) {
            iframe.msRequestFullscreen();
          }
        });
      }
      
      if (refreshBtn) {
        refreshBtn.addEventListener('click', () => {
          const currentSrc = iframe.src;
          iframe.src = '';
          setTimeout(() => {
            iframe.src = currentSrc;
          }, 100);
        });
      }
    }
    
    // Initialize controls when page loads (after elements are created)
    setTimeout(function() {
      initializePlayerControls();
    }, 1500);
  </script>

  <script src="./assets/js/ads-loader.js"></script>
</body>
